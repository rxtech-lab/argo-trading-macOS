name: Tests

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:



jobs:
  test-packages:
    name: Test Swift Packages
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install xcpretty
        run: gem install xcpretty

      - name: Swift version
        run: swift --version

      - name: Run package tests
        run: ./scripts/run_package_tests.sh

  test-xcode:
    name: Test Xcode App
    runs-on: [self-hosted, ui-tests]
    concurrency:
      group: test-xcode
      cancel-in-progress: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install xcbeautify
        run: brew install xcbeautify

      - name: Swift version
        run: swift --version

      - name: Cache Xcode build
        uses: actions/cache@v5
        with:
          path: |
            ~/Library/Developer/Xcode/DerivedData
          key: ${{ runner.os }}-xcode-${{ hashFiles('**/*.swift') }}
          restore-keys: |
            ${{ runner.os }}-xcode-

      - name: Import code signing certificate
        uses: apple-actions/import-codesign-certs@v7
        with:
          p12-file-base64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          p12-password: ${{ secrets.P12_PASSWORD }}

      - name: Prepare CI test fixtures
        run: ./scripts/prepare_ci.sh

      - name: Run Xcode tests
        run: ./scripts/run_xcode_tests.sh
        env:
          SIGNING_CERTIFICATE_NAME: ${{ secrets.SIGNING_CERTIFICATE_NAME }}
          DEVELOPMENT_TEAM: ${{ secrets.APPLE_TEAM_ID }}

      - name: Extract code coverage
        run: |
          # Extract coverage for all files in the main target (includes untested files)
          xcrun xccov view --report --json --files-for-target ArgoTradingSwift test-results/TestResults.xcresult > coverage.json

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.json
          fail_ci_if_error: false

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-${{ github.run_number }}
          path: test-results/TestResults.xcresult
          retention-days: 7
          if-no-files-found: ignore

      - name: Extract screenshots from xcresult
        if: always()
        continue-on-error: true
        run: |
          if [ -d "test-results/TestResults.xcresult" ]; then
            echo "Extracting screenshots from test-results/TestResults.xcresult..."
            mkdir -p test-results/screenshots
            xcrun xcresulttool get test-results attachments \
              --path test-results/TestResults.xcresult \
              --output-path test-results/screenshots || echo "No attachments found in result bundle"
            SCREENSHOT_COUNT=$(find test-results/screenshots -type f 2>/dev/null | wc -l | tr -d ' ')
            echo "Found $SCREENSHOT_COUNT attachment(s)"
          else
            echo "Result bundle not found at test-results/TestResults.xcresult"
          fi

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-screenshots-${{ github.run_number }}
          path: test-results/screenshots/
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload xcodebuild log
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: xcodebuild-log-${{ github.run_number }}
          path: test-results/xcodebuild.log
          retention-days: 7
          if-no-files-found: ignore

      - name: Generate Test Report Summary
        if: always()
        run: |
          if [ -d "test-results/TestResults.xcresult" ]; then
            echo "## Test Results" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Test plan: \`uitest\`" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Artifacts uploaded:" >> $GITHUB_STEP_SUMMARY
            echo "- \`test-results-${{ github.run_number }}\` (xcresult bundle)" >> $GITHUB_STEP_SUMMARY
            echo "- \`test-screenshots-${{ github.run_number }}\` (attachments)" >> $GITHUB_STEP_SUMMARY
            echo "- \`xcodebuild-log-${{ github.run_number }}\` (raw log)" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Generate HTML test report (on failure)
        if: failure()
        continue-on-error: true
        run: |
          if [ -d "test-results/TestResults.xcresult" ]; then
            # Create a simple HTML report
            cat > test-results/test-report.html << 'EOF'
          <!DOCTYPE html>
          <html>
          <head>
            <title>Test Results</title>
            <style>
              body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; padding: 20px; }
              h1 { color: #d73a4a; }
              .info { background: #f6f8fa; padding: 15px; border-radius: 6px; margin: 15px 0; }
              pre { background: #f6f8fa; padding: 10px; border-radius: 6px; overflow-x: auto; }
            </style>
          </head>
          <body>
            <h1>UI Test Failure Report</h1>
            <div class="info">
              <p><strong>Run:</strong> ${{ github.run_number }}</p>
              <p><strong>Commit:</strong> ${{ github.sha }}</p>
              <p><strong>Branch:</strong> ${{ github.ref_name }}</p>
            </div>
            <h2>Test Artifacts</h2>
            <p>The complete .xcresult bundle and extracted attachments (screenshots, videos, logs) are available in the artifacts.</p>
            <h3>How to Debug:</h3>
            <ol>
              <li>Download the test-results artifact from this workflow run</li>
              <li>Open TestResults.xcresult in Xcode to view detailed test results, screenshots, and videos</li>
              <li>Check the attachments/ folder for extracted screenshots and videos</li>
              <li>Review xcodebuild.log for detailed test output</li>
            </ol>
          </body>
          </html>
          EOF

            echo "Generated HTML report at test-results/test-report.html"
          fi

      - name: Comment PR with test failure (on failure)
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v9
        with:
          script: |
            const runNumber = context.runNumber;
            const artifactUrl = `https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}`;

            const comment = `## UI Test Failure ❌

            The UI tests failed in this PR. Test artifacts including screenshots, videos, and logs have been captured.

            ### Debug Information
            - **Workflow Run:** [#${runNumber}](${artifactUrl})
            - **Commit:** \`${{ github.sha }}\`

            ### How to Debug
            1. Download the \`test-results-${runNumber}\` artifact from the [workflow run](${artifactUrl})
            2. Open \`TestResults.xcresult\` in Xcode to view:
               - Detailed test results
               - Screenshots of failures
               - Screen recordings
               - Test logs
            3. Check the \`attachments/\` folder for extracted media
            4. Review \`xcodebuild.log\` for detailed output

            ### Viewing the .xcresult Bundle
            \`\`\`bash
            # After downloading and extracting the artifact
            open test-results/TestResults.xcresult
            \`\`\`
            `;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
